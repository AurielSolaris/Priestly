<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 96" width="48" height="96" role="img" aria-label="Priestly rosary logo">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7DE8B"/>
      <stop offset="0.5" stop-color="#E9C25A"/>
      <stop offset="1" stop-color="#C89B2E"/>
    </linearGradient>
    <radialGradient id="goldBead" cx="0.35" cy="0.32" r="0.75">
      <stop offset="0" stop-color="#FBE8AE"/>
      <stop offset="0.55" stop-color="#E9C25A"/>
      <stop offset="1" stop-color="#BE922A"/>
    </radialGradient>
  </defs>

  <!-- Golden rosary as it would rest on a surface: an uneven bead loop that
       comes round from the right and dents slightly inward (a shallow U) on the
       left before it closes, with an upright straight cross hanging below.
       Golden fill throughout, white outline. -->
  <g stroke="#FFFFFF" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">

    <!-- Cord: the organic loop, with the inward dent on the left -->
    <path d="M40 24
             C 40 13, 32 8, 23 8
             C 17 8, 12 13, 11 19
             C 10.2 23, 15 23.2, 16 25.2
             C 17 27.2, 12.2 29, 12.6 32
             C 14 37, 19 40, 26 40
             C 33 40, 40 34, 40 24 Z"
          fill="none"/>
    <!-- Cord: pendant strand down to the cross -->
    <line x1="26" y1="40" x2="26" y2="54" stroke-width="1.6"/>

    <!-- Beads following the organic loop (uneven, dented inward at the left) -->
    <g fill="url(#goldBead)">
      <circle cx="40.0" cy="24.0" r="3.1"/>
      <circle cx="37.2" cy="14.4" r="3.1"/>
      <circle cx="30.2" cy="9.2"  r="3.1"/>
      <circle cx="22.6" cy="8.0"  r="3.1"/>
      <circle cx="15.6" cy="11.0" r="3.1"/>
      <circle cx="11.4" cy="18.2" r="3.1"/>
      <circle cx="16.2" cy="25.2" r="3.1"/>   <!-- the inward dent -->
      <circle cx="12.6" cy="31.4" r="3.1"/>
      <circle cx="18.4" cy="38.0" r="3.1"/>
      <circle cx="33.6" cy="37.0" r="3.1"/>
      <circle cx="39.0" cy="30.6" r="3.1"/>
    </g>

    <!-- Junction medallion (larger centre bead) + pendant bead -->
    <circle cx="26" cy="40" r="4.0" fill="url(#goldBead)"/>
    <circle cx="26" cy="49" r="2.8" fill="url(#goldBead)"/>

    <!-- Upright straight cross: golden fill, white outline -->
    <path d="M23 54 H29 V61 H34 V67 H29 V89 H23 V67 H18 V61 H23 Z"
          fill="url(#gold)"/>
    <!-- Cross highlight for a little depth -->
    <path d="M24.4 56 V87 M19.5 64 H32.5" stroke="#FFF6DC" stroke-width="0.8"
          opacity="0.5" fill="none"/>
  </g>
</svg>
